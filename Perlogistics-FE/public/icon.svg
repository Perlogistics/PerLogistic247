<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0A1F44; }
      .foreground { fill: #008080; }
      .accent { fill: #FF8C00; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #008080; }
      .foreground { fill: #0A1F44; }
      .accent { fill: #FF8C00; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <g transform="translate(30, 30)">
    <!-- Shipping Container -->
    <rect class="foreground" x="20" y="40" width="80" height="60" rx="4" />
    <rect class="foreground" x="25" y="45" width="70" height="50" rx="2" fill="none" stroke-width="2"/>
    <!-- Container Lines -->
    <line class="accent" x1="20" y1="55" x2="100" y2="55" stroke-width="3"/>
    <line class="accent" x1="20" y1="70" x2="100" y2="70" stroke-width="3"/>
    <line class="accent" x1="20" y1="85" x2="100" y2="85" stroke-width="3"/>
    <!-- PL Text -->
    <text x="60" y="130" text-anchor="middle" class="foreground" font-family="Arial, sans-serif" font-size="24" font-weight="bold">PL</text>
  </g>
</svg>