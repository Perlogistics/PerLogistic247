version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: supply-chain-db
    environment:
      POSTGRES_DB: supply_chain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: supply-chain-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Stellar Quickstart for Soroban development
  stellar:
    image: stellar/quickstart:latest
    container_name: supply-chain-stellar
    ports:
      - "8000:8000"  # Friendbot
      - "8001:8001"  # RPC
      - "8002:8002"  # Horizon
    environment:
      - STELLAR_NETWORK=standalone
    command: --standalone --enable-rpc --enable-friendbot

  # Migration runner
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supply-chain-migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/supply_chain
      MIGRATIONS_DIR: /app/migrations
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/target
    command: cargo run --bin migrate -- up

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supply-chain-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/supply_chain
      REDIS_URL: redis://redis:6379
      STELLAR_NETWORK: standalone
      STELLAR_RPC_URL: http://stellar:8001
      RUST_LOG: debug
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      stellar:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/target

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supply-chain-frontend
    environment:
      NEXT_PUBLIC_STELLAR_NETWORK: standalone
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      NEXT_PUBLIC_STELLAR_RPC_URL: http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: supply-chain-network
